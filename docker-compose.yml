version: '3.8'

services:
  traffic-monitor:
    build: .
    container_name: traffic-monitor
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '8080:8080'
    volumes:
      - ./data:/data
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:8080/health',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
