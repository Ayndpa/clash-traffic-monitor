<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C5CE7"/>
      <stop offset="100%" stop-color="#5F46FF"/>
    </linearGradient>
    <linearGradient id="up" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#3DB8FF"/>
      <stop offset="100%" stop-color="#5BC4FF"/>
    </linearGradient>
    <linearGradient id="down" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#31D184"/>
      <stop offset="100%" stop-color="#17C49B"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#5F46FF" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="6" y="6" width="116" height="116" rx="28" ry="28" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Gauge arc background -->
  <path d="M 34 82 A 38 38 0 0 1 94 82" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="8" stroke-linecap="round"/>

  <!-- Gauge arc fill (traffic) -->
  <path d="M 34 82 A 38 38 0 0 1 88 56" fill="none" stroke="url(#down)" stroke-width="8" stroke-linecap="round"/>

  <!-- Gauge center dot -->
  <circle cx="64" cy="82" r="5" fill="white" opacity="0.9"/>

  <!-- Upload arrow (blue, upper-left) -->
  <g transform="translate(28, 30)">
    <polygon points="12,0 24,14 17,14 17,28 7,28 7,14 0,14" fill="url(#up)" opacity="0.95"/>
  </g>

  <!-- Download arrow (green, upper-right) -->
  <g transform="translate(76, 30)">
    <polygon points="12,28 24,14 17,14 17,0 7,0 7,14 0,14" fill="url(#down)" opacity="0.95"/>
  </g>
</svg>
